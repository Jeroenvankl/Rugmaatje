<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE8D6"/>
      <stop offset="50%" stop-color="#FDE2E4"/>
      <stop offset="100%" stop-color="#D8E8F5"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B7E4C7"/>
      <stop offset="100%" stop-color="#8FD3A6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- soft back curve (bol, nooit hol) -->
  <path d="M 176 120 C 176 200, 226 216, 226 296 C 226 356, 190 380, 190 392"
        fill="none" stroke="#E9C6E0" stroke-width="26" stroke-linecap="round"/>
  <!-- little heart resting on the curve, symbol of self-care -->
  <g transform="translate(256,300)">
    <path d="M0 34 C -60 -6, -46 -64, -6 -58 C 6 -56, 0 -40, 0 -32
             C 0 -40, -6 -56, 6 -58 C 46 -64, 60 -6, 0 34 Z"
          fill="url(#leaf)"/>
  </g>
  <circle cx="176" cy="120" r="20" fill="#F6C6D0"/>
</svg>
